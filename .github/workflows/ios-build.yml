name: iOS Build & TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane を選択 (beta = TestFlight / release = App Store)"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - release
  push:
    tags:
      - "v*.*.*-ios"

# 同時実行を 1 本に制限 (証明書競合回避)
concurrency:
  group: ios-build
  cancel-in-progress: false

jobs:
  build:
    name: Build & Upload
    runs-on: macos-15
    timeout-minutes: 60

    env:
      # Fastlane
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"
      FASTLANE_DISABLE_COLORS: "1"
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

      # ビルド署名
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        # App Store Connect は 2026-04-28 以降、iOS 26 SDK (Xcode 26+) を必須化する。
        # macos-15 runner には Xcode_26.0 ~ Xcode_26.3 がプリインストールされている。
        # シンボリックリンク /Applications/Xcode.app は Xcode 16.1 を指しており最新ではないため、
        # 明示的に 26.3 を指定する。
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Write App Store Connect API Key JSON
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/appstore
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/appstore/AuthKey.p8
          cat > $RUNNER_TEMP/appstore/api_key.json <<EOF
          {
            "key_id": "$APP_STORE_CONNECT_API_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_API_ISSUER_ID",
            "key": $(python3 -c "import json,sys; print(json.dumps(open('$RUNNER_TEMP/appstore/AuthKey.p8').read()))"),
            "in_house": false
          }
          EOF
          echo "APP_STORE_CONNECT_API_KEY_JSON_PATH=$RUNNER_TEMP/appstore/api_key.json" >> $GITHUB_ENV

      - name: Install CocoaPods dependencies (if Podfile exists)
        run: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install --repo-update
          else
            echo "No Podfile present; skipping pod install."
          fi

      - name: Run Fastlane
        env:
          # 手動トリガーは inputs.lane / tag push は常に beta
          FASTLANE_LANE: ${{ github.event.inputs.lane || 'beta' }}
        run: |
          bundle exec fastlane ios $FASTLANE_LANE

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Filmo-ipa
          path: build/ios/*.ipa
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Fastlane logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: |
            fastlane/report.xml
            ~/Library/Logs/gym/**/*.log
          if-no-files-found: ignore
          retention-days: 7
